services:
  - type: web
    name: diet-weight-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AUTH_REQUIRED
        value: "true"
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FORCE_SECURE_COOKIE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: diet-weight-db
          property: connectionString

databases:
  - name: diet-weight-db
    plan: free
    postgresMajorVersion: "17"
